[tasks.mysql_configure]
run = '''
ln -sfn ../../src mysql-server/storage/toydb
cd mysql-server
rm -rf build
mkdir build
cd build
cmake .. -DDOWNLOAD_BOOST=1 -DWITH_BOOST=../boost -DCMAKE_EXPORT_COMPILE_COMMANDS=ON -DBISON_EXECUTABLE=$(brew --prefix bison)/bin/bison
cd mysql-server/build
# for generate mysqld_error.h
cmake --build . --target GenError
'''
