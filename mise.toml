min_version = "2025.12.12"

[tasks."mysql:configure"]
run = """
ln -sfn ../../src mysql-server/storage/toydb

cd mysql-server
rm -rf build
mkdir -p build
cd build

cmake .. -DDOWNLOAD_BOOST=1 -DWITH_BOOST=../boost -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
"""

[tasks."mysql:gen-error"]
depends = ["mysql:configure"]
run = """
cd mysql-server/build
cmake --build . --target GenError
"""

[tasks.fmt]
run = """
find src .vscode -name "*.cc" -o -name "*.h" \
| xargs clang-format -i
"""

[tasks."fmt:check"]
run = """
find src .vscode -name "*.cc" -o -name "*.h" \
| xargs clang-format --dry-run --Werror
"""

[tasks.lint]
run = """
find src -name "*.cc" -o -name "*.h" \
| xargs clang-tidy -p mysql-server/build --extra-arg=-isystem --extra-arg="$LIBCXX_INCLUDE_PATH"
"""

[tasks."lint:fix"]
run = """
find src -name "*.cc" -o -name "*.h" \
| xargs clang-tidy -fix -p mysql-server/build --extra-arg=-isystem --extra-arg="$LIBCXX_INCLUDE_PATH"
"""
